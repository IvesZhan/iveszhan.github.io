<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZenSee 通用链接</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f0e7;
      --surface: rgba(255, 251, 246, 0.88);
      --line: rgba(72, 53, 38, 0.12);
      --text: #2b231c;
      --muted: #6d6257;
      --accent: #7a6552;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.86), transparent 30%),
        radial-gradient(circle at top right, rgba(233, 214, 196, 0.48), transparent 28%),
        linear-gradient(180deg, #f7f0e7 0%, #f4ede4 50%, #efe7dd 100%);
      color: var(--text);
      font: 16px/1.7 "PingFang SC", "Hiragino Sans GB", sans-serif;
    }

    main {
      width: min(560px, 100%);
      padding: 28px 24px;
      border-radius: 28px;
      background: var(--surface);
      border: 1px solid var(--line);
      box-shadow: 0 22px 40px rgba(72, 53, 38, 0.08);
    }

    h1 {
      margin: 0 0 12px;
      font: 700 28px/1.25 "Noto Serif SC", "Songti SC", serif;
    }

    p {
      margin: 0 0 12px;
      color: var(--muted);
    }

    .guide {
      margin-top: 18px;
      padding: 16px 18px;
      border-radius: 18px;
      background: rgba(255, 252, 248, 0.72);
      border: 1px solid var(--line);
    }

    .guide strong {
      display: block;
      margin-bottom: 8px;
      color: var(--text);
      font-size: 15px;
    }

    .guide ol {
      margin: 0;
      padding-left: 20px;
      color: var(--muted);
    }

    .guide li + li {
      margin-top: 6px;
    }

    .actions {
      display: grid;
      gap: 12px;
      margin-top: 22px;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 12px 18px;
      border-radius: 999px;
      background: linear-gradient(180deg, #8e7864 0%, #75604e 100%);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
    }

    a.secondary {
      background: rgba(255, 252, 248, 0.72);
      border: 1px solid var(--line);
      color: var(--text);
    }

    code {
      display: block;
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255, 252, 248, 0.68);
      border: 1px solid var(--line);
      color: var(--accent);
      font: 13px/1.6 ui-monospace, SFMono-Regular, Menlo, monospace;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <main>
    <h1 id="title">ZenSee 通用链接</h1>
    <p id="summary">如果设备已安装 ZenSee，点击这条通用链接时应直接打开 App。</p>
    <p id="hint">如果当前仍停留在第三方浏览器，请尝试用系统默认浏览器重新打开这条链接。</p>
    <div class="guide" id="guide">
      <strong id="guide-title">如果没有自动拉起 App</strong>
      <ol id="guide-steps">
        <li>点击右上角菜单，选择“在默认浏览器中打开”或类似选项。</li>
        <li>系统默认浏览器会再次尝试拉起 ZenSee。</li>
        <li>如果设备尚未安装 ZenSee，可以先使用下方按钮下载。</li>
      </ol>
    </div>
    <code id="link-preview"></code>
    <div class="actions">
      <a id="primary-link" href="https://iveszhan.github.io/zensee-web/">前往 ZenSee 官网</a>
      <a class="secondary" href="https://apps.apple.com/app/6760809128">下载 iOS 版</a>
      <a class="secondary" href="https://raw.githubusercontent.com/IvesZhan/zensee-android/main/downloads/latest/ZenSee-android-latest.apk">下载 Android 版</a>
    </div>
  </main>
  <script>
    const params = new URLSearchParams(window.location.search);
    const groupId = params.get("id");
    const target = (params.get("target") || "").toLowerCase();
    const isGroupJoin = Boolean(groupId) && (!target || target === "group-join" || target === "join");
    const currentURL = window.location.href;
    const androidDownloadURL = "https://iveszhan.github.io/zensee-web/download/";
    const linkPreview = document.getElementById("link-preview");
    const title = document.getElementById("title");
    const summary = document.getElementById("summary");
    const hint = document.getElementById("hint");
    const guideTitle = document.getElementById("guide-title");
    const guideSteps = document.getElementById("guide-steps");
    const primaryLink = document.getElementById("primary-link");

    function isAndroidDevice() {
      return /android/i.test(navigator.userAgent || "");
    }

    function groupUniversalLink(value) {
      return "https://iveszhan.github.io/zensee/?target=group-join&id=" + encodeURIComponent(value);
    }

    function groupCustomSchemeLink(value) {
      return "zensee://group/join?id=" + encodeURIComponent(value);
    }

    function groupIntentLink(value) {
      return "intent://group/join?id=" + encodeURIComponent(value) +
        "#Intent;scheme=zensee;package=com.yuzhan.zenseeapp;S.browser_fallback_url=" +
        encodeURIComponent(androidDownloadURL) + ";end";
    }

    function attemptAndroidAppOpen(value) {
      try {
        const sessionKey = "zensee-android-open-attempt:" + value;
        if (window.sessionStorage && window.sessionStorage.getItem(sessionKey) === "1") {
          return;
        }
        if (window.sessionStorage) {
          window.sessionStorage.setItem(sessionKey, "1");
        }
      } catch (error) {
        console.warn("[zensee] failed to persist android open attempt", error);
      }

      window.setTimeout(function () {
        if (!document.hidden) {
          window.location.href = groupCustomSchemeLink(value);
        }
      }, 140);
    }

    linkPreview.textContent = currentURL;

    if (isGroupJoin) {
      title.textContent = "ZenSee 群组邀请链接";
      summary.textContent = isAndroidDevice()
        ? "如果设备已安装 ZenSee，当前页面会优先尝试直接打开 App 并进入群组加入流程。"
        : "如果设备已安装 ZenSee，点击这条链接时应直接打开 App。";
      hint.textContent = isAndroidDevice()
        ? "部分 Android 浏览器不会在已打开网页中再次触发 App Link。若没有自动跳转，请点击下方按钮直接打开 ZenSee。"
        : "如果当前仍停留在第三方浏览器，请尝试用系统默认浏览器重新打开这条链接。";
      guideTitle.textContent = "群组邀请链接打开方式";
      guideSteps.innerHTML = isAndroidDevice()
        ? [
            "<li>页面会先尝试直接打开 ZenSee。</li>",
            "<li>如果没有成功拉起 App，请点击下方“打开 ZenSee App”按钮。</li>",
            "<li>如果设备尚未安装 ZenSee，可先使用下载按钮安装后再回来重试。</li>"
          ].join("")
        : [
            "<li>点击右上角菜单，选择“在默认浏览器中打开”或类似选项。</li>",
            "<li>系统默认浏览器会再次尝试拉起 ZenSee，并跳到该群组的加入流程。</li>",
            "<li>如果还没有安装 ZenSee，可先用下方按钮下载，安装后再回到这条邀请链接。</li>"
          ].join("");
      primaryLink.hidden = false;
      primaryLink.textContent = isAndroidDevice() ? "打开 ZenSee App" : "重新打开群组邀请";
      primaryLink.href = isAndroidDevice() ? groupIntentLink(groupId) : groupUniversalLink(groupId);

      if (isAndroidDevice()) {
        attemptAndroidAppOpen(groupId);
      }
    }
  </script>
</body>
</html>
