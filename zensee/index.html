<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>禅·见 通用链接</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f0e7;
      --surface: rgba(255, 251, 246, 0.88);
      --line: rgba(72, 53, 38, 0.12);
      --text: #2b231c;
      --muted: #6d6257;
      --accent: #7a6552;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.86), transparent 30%),
        radial-gradient(circle at top right, rgba(233, 214, 196, 0.48), transparent 28%),
        linear-gradient(180deg, #f7f0e7 0%, #f4ede4 50%, #efe7dd 100%);
      color: var(--text);
      font: 16px/1.7 "PingFang SC", "Hiragino Sans GB", sans-serif;
    }

    main {
      width: min(560px, 100%);
      padding: 28px 24px;
      border-radius: 28px;
      background: var(--surface);
      border: 1px solid var(--line);
      box-shadow: 0 22px 40px rgba(72, 53, 38, 0.08);
    }

    h1 {
      margin: 0 0 12px;
      font: 700 28px/1.25 "Noto Serif SC", "Songti SC", serif;
    }

    p {
      margin: 0 0 12px;
      color: var(--muted);
    }

    .guide {
      margin-top: 18px;
      padding: 16px 18px;
      border-radius: 18px;
      background: rgba(255, 252, 248, 0.72);
      border: 1px solid var(--line);
    }

    .guide strong {
      display: block;
      margin-bottom: 8px;
      color: var(--text);
      font-size: 15px;
    }

    .guide ol {
      margin: 0;
      padding-left: 20px;
      color: var(--muted);
    }

    .guide li + li {
      margin-top: 6px;
    }

    .actions {
      display: grid;
      gap: 12px;
      margin-top: 22px;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 12px 18px;
      border-radius: 999px;
      background: linear-gradient(180deg, #8e7864 0%, #75604e 100%);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
    }

    a.secondary {
      background: rgba(255, 252, 248, 0.72);
      border: 1px solid var(--line);
      color: var(--text);
    }

    code {
      display: block;
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255, 252, 248, 0.68);
      border: 1px solid var(--line);
      color: var(--accent);
      font: 13px/1.6 ui-monospace, SFMono-Regular, Menlo, monospace;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <main>
    <h1 id="title">禅·见 通用链接</h1>
    <p id="summary">如果设备已安装禅·见，点击这条通用链接时应直接打开 App。</p>
    <p id="hint">如果当前仍停留在第三方浏览器，请尝试用系统默认浏览器重新打开这条链接。</p>
    <div class="guide" id="guide">
      <strong id="guide-title">如果没有自动拉起 App</strong>
      <ol id="guide-steps">
        <li>点击右上角菜单，选择“在默认浏览器中打开”或类似选项。</li>
        <li>系统默认浏览器会再次尝试拉起禅·见。</li>
        <li>如果设备尚未安装禅·见，可以先使用下方按钮下载。</li>
      </ol>
    </div>
    <code id="link-preview"></code>
    <div class="actions">
      <a id="primary-link" href="https://iveszhan.github.io/zensee-web/" hidden>前往禅·见官网</a>
      <a class="secondary" id="ios-download-link" href="https://apps.apple.com/app/6760809128">下载 iOS 版</a>
      <a class="secondary" id="android-download-link" href="https://www.pgyer.com/zensee-android">下载 Android 版</a>
    </div>
  </main>
  <script>
    const params = new URLSearchParams(window.location.search);
    const groupId = params.get("id");
    const target = (params.get("target") || "").toLowerCase();
    const isGroupJoin = Boolean(groupId) && (!target || target === "group-join" || target === "join");
    const currentURL = window.location.href;
    const linkPreview = document.getElementById("link-preview");
    const title = document.getElementById("title");
    const summary = document.getElementById("summary");
    const hint = document.getElementById("hint");
    const guideTitle = document.getElementById("guide-title");
    const guideSteps = document.getElementById("guide-steps");
    const primaryLink = document.getElementById("primary-link");
    const iosDownloadLink = document.getElementById("ios-download-link");
    const androidDownloadLink = document.getElementById("android-download-link");
    const pgyerAndroidDownloadURL = "https://www.pgyer.com/zensee-android";
    const githubAndroidDownloadURL = "https://raw.githubusercontent.com/IvesZhan/zensee-android/main/downloads/latest/ZenSee-android-latest.apk";
    const locale = detectLocale();
    const copy = localeCopy(locale);

    function isAndroidDevice() {
      return /android/i.test(navigator.userAgent || "");
    }

    function isSimplifiedChineseLocale(value) {
      const lang = String(value || "").toLowerCase();
      if (
        lang.indexOf("zh-tw") === 0 ||
        lang.indexOf("zh-hk") === 0 ||
        lang.indexOf("zh-mo") === 0 ||
        lang.indexOf("zh-hant") === 0
      ) {
        return false;
      }
      return lang.indexOf("zh") === 0;
    }

    function resolvedAndroidDownloadLink() {
      return isSimplifiedChineseLocale(navigator.language || document.documentElement.lang)
        ? pgyerAndroidDownloadURL
        : githubAndroidDownloadURL;
    }

    function detectLocale() {
      const lang = String(navigator.language || document.documentElement.lang || "").toLowerCase();
      if (lang.indexOf("ja") === 0) {
        return "ja";
      }
      if (
        lang.indexOf("zh-tw") === 0 ||
        lang.indexOf("zh-hk") === 0 ||
        lang.indexOf("zh-mo") === 0 ||
        lang.indexOf("zh-hant") === 0
      ) {
        return "zh-hant";
      }
      if (lang.indexOf("zh") === 0) {
        return "zh-cn";
      }
      return "en";
    }

    function localeCopy(currentLocale) {
      const table = {
        "zh-cn": {
          htmlLang: "zh-CN",
          brand: "禅·见",
          defaultPageTitle: "禅·见 通用链接",
          defaultHeading: "禅·见 通用链接",
          defaultSummary: "如果设备已安装禅·见，点击这条通用链接时应直接打开 App。",
          defaultHint: "如果当前仍停留在第三方浏览器，请尝试用系统默认浏览器重新打开这条链接。",
          defaultGuideTitle: "如果没有自动拉起 App",
          defaultGuideSteps: [
            "点击右上角菜单，选择“在默认浏览器中打开”或类似选项。",
            "系统默认浏览器会再次尝试拉起禅·见。",
            "如果设备尚未安装禅·见，可以先使用下方按钮下载。"
          ],
          groupPageTitle: "禅·见 群组邀请链接",
          groupHeading: "禅·见 群组邀请链接",
          groupSummary: "如果设备已安装禅·见，点击这条链接时应直接打开 App，并进入群组加入流程。",
          groupSummaryAndroid: "如果设备已安装禅·见，当前页面会优先尝试直接打开 App 并进入群组加入流程。",
          groupHint: "如果没有自动跳转，可点击右上角按钮，使用系统默认浏览器打开。",
          groupGuideTitle: "群组邀请链接打开方式",
          groupGuideSteps: [
            "点击右上角菜单，选择“在默认浏览器中打开”或类似选项。",
            "系统默认浏览器会再次尝试拉起禅·见，并进入该群组的加入流程。",
            "如果还没有安装禅·见，可先使用下方按钮下载，安装后再回到这条邀请链接。"
          ],
          primaryWebsiteLabel: "前往禅·见官网",
          iosDownloadLabel: "下载 iOS 版",
          androidDownloadLabel: "下载 Android 版"
        },
        "zh-hant": {
          htmlLang: "zh-Hant",
          brand: "禪·見",
          defaultPageTitle: "禪·見 通用連結",
          defaultHeading: "禪·見 通用連結",
          defaultSummary: "如果裝置已安裝禪·見，點擊這條通用連結時應直接打開 App。",
          defaultHint: "如果目前仍停留在第三方瀏覽器，請嘗試用系統預設瀏覽器重新打開這條連結。",
          defaultGuideTitle: "如果沒有自動拉起 App",
          defaultGuideSteps: [
            "點擊右上角選單，選擇「在預設瀏覽器中打開」或類似選項。",
            "系統預設瀏覽器會再次嘗試拉起禪·見。",
            "如果裝置尚未安裝禪·見，可以先使用下方按鈕下載。"
          ],
          groupPageTitle: "禪·見 群組邀請連結",
          groupHeading: "禪·見 群組邀請連結",
          groupSummary: "如果裝置已安裝禪·見，點擊這條連結時應直接打開 App，並進入群組加入流程。",
          groupSummaryAndroid: "如果裝置已安裝禪·見，目前頁面會優先嘗試直接打開 App 並進入群組加入流程。",
          groupHint: "如果沒有自動跳轉，可點擊右上角按鈕，使用系統預設瀏覽器打開。",
          groupGuideTitle: "群組邀請連結打開方式",
          groupGuideSteps: [
            "點擊右上角選單，選擇「在預設瀏覽器中打開」或類似選項。",
            "系統預設瀏覽器會再次嘗試拉起禪·見，並進入該群組的加入流程。",
            "如果還沒有安裝禪·見，可先使用下方按鈕下載，安裝後再回到這條邀請連結。"
          ],
          primaryWebsiteLabel: "前往禪·見官網",
          iosDownloadLabel: "下載 iOS 版",
          androidDownloadLabel: "下載 Android 版"
        },
        "ja": {
          htmlLang: "ja",
          brand: "禅·見",
          defaultPageTitle: "禅·見 ユニバーサルリンク",
          defaultHeading: "禅·見 ユニバーサルリンク",
          defaultSummary: "端末に禅·見がインストールされていれば、このユニバーサルリンクを開くと App が直接起動します。",
          defaultHint: "まだサードパーティ製ブラウザ内にいる場合は、システム標準ブラウザでこのリンクを開き直してください。",
          defaultGuideTitle: "App が自動で開かない場合",
          defaultGuideSteps: [
            "右上のメニューから「標準ブラウザで開く」などの項目を選択してください。",
            "システム標準ブラウザが、もう一度禅·見の起動を試みます。",
            "端末に禅·見が未インストールの場合は、下のボタンから先にダウンロードできます。"
          ],
          groupPageTitle: "禅·見 グループ招待リンク",
          groupHeading: "禅·見 グループ招待リンク",
          groupSummary: "端末に禅·見がインストールされていれば、このリンクを開くと App が直接起動し、グループ参加フローに進みます。",
          groupSummaryAndroid: "端末に禅·見がインストールされていれば、このページはまず App を直接開いてグループ参加フローに進もうとします。",
          groupHint: "自動で遷移しない場合は、右上のメニューからシステム標準ブラウザで開いてください。",
          groupGuideTitle: "グループ招待リンクの開き方",
          groupGuideSteps: [
            "右上のメニューから「標準ブラウザで開く」などの項目を選択してください。",
            "システム標準ブラウザが、もう一度禅·見を起動し、このグループの参加フローを開きます。",
            "まだ禅·見がインストールされていない場合は、下のダウンロードボタンから先にインストールしてください。"
          ],
          primaryWebsiteLabel: "禅·見 公式サイトへ",
          iosDownloadLabel: "iOS 版をダウンロード",
          androidDownloadLabel: "Android 版をダウンロード"
        },
        "en": {
          htmlLang: "en",
          brand: "ZenSee",
          defaultPageTitle: "ZenSee Universal Link",
          defaultHeading: "ZenSee Universal Link",
          defaultSummary: "If ZenSee is installed on this device, opening this universal link should launch the app directly.",
          defaultHint: "If you are still inside a third-party browser, try reopening this link in the system default browser.",
          defaultGuideTitle: "If the app does not open automatically",
          defaultGuideSteps: [
            "Open the menu in the top-right corner and choose the system default browser.",
            "The system browser will try to launch ZenSee again.",
            "If ZenSee is not installed yet, you can download it with the buttons below."
          ],
          groupPageTitle: "ZenSee Group Invite Link",
          groupHeading: "ZenSee Group Invite Link",
          groupSummary: "If ZenSee is installed on this device, opening this link should launch the app and continue to the group join flow.",
          groupSummaryAndroid: "If ZenSee is installed on this device, this page will first try to open the app and continue to the group join flow.",
          groupHint: "If it does not open automatically, use the menu in the top-right corner to open this link in the system default browser.",
          groupGuideTitle: "How to open this group invite link",
          groupGuideSteps: [
            "Open the menu in the top-right corner and choose the system default browser.",
            "The system browser will try to launch ZenSee again and continue to the group join flow.",
            "If ZenSee is not installed yet, download it below and then return to this invite link."
          ],
          primaryWebsiteLabel: "Visit ZenSee Website",
          iosDownloadLabel: "Download for iOS",
          androidDownloadLabel: "Download for Android"
        }
      };

      return table[currentLocale] || table["en"];
    }

    function groupCustomSchemeLink(value) {
      return "zensee://group/join?id=" + encodeURIComponent(value);
    }

    function attemptAndroidAppOpen(value) {
      try {
        const sessionKey = "zensee-android-open-attempt:" + value;
        if (window.sessionStorage && window.sessionStorage.getItem(sessionKey) === "1") {
          return;
        }
        if (window.sessionStorage) {
          window.sessionStorage.setItem(sessionKey, "1");
        }
      } catch (error) {
        console.warn("[zensee] failed to persist android open attempt", error);
      }

      window.setTimeout(function () {
        if (!document.hidden) {
          window.location.href = groupCustomSchemeLink(value);
        }
      }, 140);
    }

    function renderSteps(items) {
      guideSteps.innerHTML = items.map(function (item) {
        return "<li>" + item + "</li>";
      }).join("");
    }

    document.documentElement.lang = copy.htmlLang;
    document.title = copy.defaultPageTitle;
    linkPreview.textContent = currentURL;
    title.textContent = copy.defaultHeading;
    summary.textContent = copy.defaultSummary;
    hint.textContent = copy.defaultHint;
    guideTitle.textContent = copy.defaultGuideTitle;
    renderSteps(copy.defaultGuideSteps);
    primaryLink.textContent = copy.primaryWebsiteLabel;
    primaryLink.hidden = false;
    iosDownloadLink.textContent = copy.iosDownloadLabel;
    androidDownloadLink.href = resolvedAndroidDownloadLink();
    androidDownloadLink.textContent = copy.androidDownloadLabel;

    if (isGroupJoin) {
      document.title = copy.groupPageTitle;
      title.textContent = copy.groupHeading;
      summary.textContent = isAndroidDevice() ? copy.groupSummaryAndroid : copy.groupSummary;
      hint.textContent = copy.groupHint;
      guideTitle.textContent = copy.groupGuideTitle;
      renderSteps(copy.groupGuideSteps);
      primaryLink.hidden = true;

      if (isAndroidDevice()) {
        attemptAndroidAppOpen(groupId);
      }
    }
  </script>
</body>
</html>
