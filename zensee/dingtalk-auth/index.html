<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>ZenSee 钉钉登录回调</title>
  <style>
    :root {
      color-scheme: light;
      --bg-top: #eef7ff;
      --bg-bottom: #dbeafe;
      --surface: rgba(255, 255, 255, 0.82);
      --line: rgba(15, 23, 42, 0.1);
      --text: #10233a;
      --muted: #526173;
      --accent: #1677ff;
      --accent-deep: #0b5bd3;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.9), transparent 28%),
        radial-gradient(circle at right, rgba(22, 119, 255, 0.18), transparent 32%),
        linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
      color: var(--text);
      font: 16px/1.7 "PingFang SC", "Hiragino Sans GB", sans-serif;
    }

    main {
      width: min(560px, 100%);
      padding: 28px 24px;
      border-radius: 28px;
      background: var(--surface);
      border: 1px solid var(--line);
      box-shadow: 0 24px 48px rgba(15, 23, 42, 0.12);
      backdrop-filter: blur(18px);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 32px;
      padding: 0 14px;
      border-radius: 999px;
      background: rgba(22, 119, 255, 0.1);
      color: var(--accent-deep);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    h1 {
      margin: 16px 0 10px;
      font: 700 30px/1.2 "Noto Serif SC", "Songti SC", serif;
    }

    p {
      margin: 0 0 12px;
      color: var(--muted);
    }

    .panel {
      margin-top: 18px;
      padding: 16px 18px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(15, 23, 42, 0.08);
    }

    .panel strong {
      display: block;
      margin-bottom: 8px;
      color: var(--text);
    }

    .panel ol {
      margin: 0;
      padding-left: 20px;
      color: var(--muted);
    }

    .panel li + li {
      margin-top: 6px;
    }

    .actions {
      display: grid;
      gap: 12px;
      margin-top: 22px;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 12px 18px;
      border-radius: 999px;
      background: linear-gradient(180deg, var(--accent) 0%, var(--accent-deep) 100%);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
    }

    a.secondary {
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid var(--line);
      color: var(--text);
    }

    code {
      display: block;
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(15, 23, 42, 0.08);
      color: var(--accent-deep);
      font: 13px/1.6 ui-monospace, SFMono-Regular, Menlo, monospace;
      word-break: break-all;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <main>
    <div class="badge">DingTalk OAuth Redirect</div>
    <h1>ZenSee 钉钉登录回调页</h1>
    <p id="summary">这个地址用于钉钉开放平台登录回调校验。正常情况下，授权完成后会自动返回 ZenSee App。</p>
    <p id="hint">如果当前仍停留在浏览器，请返回 ZenSee 后重新尝试登录。</p>
    <div class="panel">
      <strong>如果没有自动回到 App</strong>
      <ol>
        <li>确认设备上已安装最新版本钉钉和 ZenSee。</li>
        <li>返回 ZenSee，重新点击“钉钉登录”。</li>
        <li>若问题持续，请检查钉钉开放平台中的 Redirect URI 是否与当前页面地址完全一致。</li>
      </ol>
    </div>
    <code id="link-preview"></code>
    <div class="actions">
      <a href="https://iveszhan.github.io/zensee/">打开 ZenSee 通用链接页</a>
      <a class="secondary" href="https://apps.apple.com/app/6760809128">下载 iOS 版</a>
    </div>
  </main>
  <script>
    const preview = document.getElementById("link-preview");
    preview.textContent = window.location.href;
  </script>
</body>
</html>
