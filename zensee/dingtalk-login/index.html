<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>ZenSee 钉钉授权</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f0e7;
      --surface: rgba(255, 251, 246, 0.9);
      --surface-strong: rgba(255, 252, 248, 0.98);
      --line: rgba(72, 53, 38, 0.12);
      --text: #2b231c;
      --muted: #6d6257;
      --accent: #8e7864;
      --accent-deep: #745f4c;
      --success: #296b53;
      --success-bg: rgba(41, 107, 83, 0.1);
      --danger: #a14539;
      --danger-bg: rgba(161, 69, 57, 0.1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.86), transparent 30%),
        radial-gradient(circle at top right, rgba(233, 214, 196, 0.48), transparent 28%),
        linear-gradient(180deg, #f7f0e7 0%, #f4ede4 50%, #efe7dd 100%);
      color: var(--text);
      font: 16px/1.7 "PingFang SC", "Hiragino Sans GB", sans-serif;
    }

    main {
      width: min(560px, 100%);
      padding: 28px 24px;
      border-radius: 28px;
      background: var(--surface);
      border: 1px solid var(--line);
      box-shadow: 0 22px 40px rgba(72, 53, 38, 0.08);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 32px;
      padding: 0 14px;
      border-radius: 999px;
      background: rgba(142, 120, 100, 0.12);
      color: var(--accent-deep);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.03em;
    }

    h1 {
      margin: 16px 0 12px;
      font: 700 30px/1.2 "Noto Serif SC", "Songti SC", serif;
    }

    p {
      margin: 0 0 12px;
      color: var(--muted);
    }

    .status {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 18px;
      background: var(--surface-strong);
      border: 1px solid var(--line);
      color: var(--muted);
    }

    .status.success {
      background: var(--success-bg);
      border-color: rgba(41, 107, 83, 0.18);
      color: var(--success);
    }

    .status.error {
      background: var(--danger-bg);
      border-color: rgba(161, 69, 57, 0.18);
      color: var(--danger);
    }

    .guide {
      margin-top: 18px;
      padding: 16px 18px;
      border-radius: 18px;
      background: rgba(255, 252, 248, 0.72);
      border: 1px solid var(--line);
    }

    .guide strong {
      display: block;
      margin-bottom: 8px;
      color: var(--text);
      font-size: 15px;
    }

    .guide ol {
      margin: 0;
      padding-left: 20px;
      color: var(--muted);
    }

    .guide li + li {
      margin-top: 6px;
    }

    .actions {
      display: grid;
      gap: 12px;
      margin-top: 22px;
    }

    button,
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 12px 18px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(180deg, var(--accent) 0%, var(--accent-deep) 100%);
      color: #fff;
      text-decoration: none;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    button.secondary,
    a.secondary {
      background: rgba(255, 252, 248, 0.72);
      border: 1px solid var(--line);
      color: var(--text);
    }

    code {
      display: block;
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255, 252, 248, 0.68);
      border: 1px solid var(--line);
      color: var(--accent);
      font: 13px/1.6 ui-monospace, SFMono-Regular, Menlo, monospace;
      word-break: break-all;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <main>
    <div class="badge">ZenSee x DingTalk</div>
    <h1 id="title">正在请求钉钉授权</h1>
    <p id="summary">ZenSee 将仅请求登录所需的钉钉个人信息权限，用于识别当前账号。</p>
    <p id="hint">授权完成后会自动返回 ZenSee。</p>

    <div id="status" class="status">准备打开钉钉授权面板…</div>

    <div class="guide">
      <strong>如果没有自动返回 ZenSee</strong>
      <ol>
        <li>先完成钉钉授权，不要直接关闭当前页面。</li>
        <li>如果仍停留在当前页，可以点击“返回 ZenSee”。</li>
        <li>若授权失败，请点击“重新发起授权”。</li>
      </ol>
    </div>

    <code id="details"></code>

    <div class="actions">
      <button id="retry-button" type="button">重新发起授权</button>
      <a id="return-link" class="secondary" href="zensee://auth/dingtalk-login">返回 ZenSee</a>
    </div>
  </main>

  <script src="./app.js"></script>
</body>
</html>
