<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZenSee Pages Root</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #141210;
      color: #e0dad5;
      font: 16px/1.6 -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
    }

    main {
      width: min(560px, calc(100vw - 48px));
      padding: 28px 24px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-sizing: border-box;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 24px;
      line-height: 1.3;
    }

    p {
      margin: 0;
      color: #c4bbb2;
    }
  </style>
</head>
<body>
  <main>
    <h1>ZenSee GitHub Pages Root</h1>
    <p>This site hosts the Apple Universal Link association files used by the ZenSee iOS app.</p>
  </main>
</body>
</html>
