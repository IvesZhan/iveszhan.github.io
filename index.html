<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IvesZhan Projects</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f6f7f8;
      --surface: #ffffff;
      --text: #1f2428;
      --muted: #66707a;
      --line: #d8dee4;
      --accent: #275c8e;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font: 16px/1.6 -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
    }

    main {
      width: min(720px, calc(100vw - 40px));
      margin: 0 auto;
      padding: 56px 0;
      box-sizing: border-box;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.3;
    }

    p {
      margin: 0;
      color: var(--muted);
    }

    .projects {
      display: grid;
      gap: 12px;
      margin-top: 28px;
    }

    a {
      display: block;
      padding: 18px 20px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: inherit;
      text-decoration: none;
    }

    a strong {
      display: block;
      color: var(--accent);
      font-size: 17px;
      margin-bottom: 4px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d1117;
        --surface: #161b22;
        --text: #f0f6fc;
        --muted: #8b949e;
        --line: #30363d;
        --accent: #79c0ff;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>IvesZhan Projects</h1>
    <p>Shared GitHub Pages entry for public project pages, app links, and static callbacks.</p>

    <section class="projects" aria-label="Projects">
      <a href="/zensee/web/">
        <strong>ZenSee</strong>
        <span>Official site, legal pages, downloads, app links, and static callbacks.</span>
      </a>
    </section>
  </main>
</body>
</html>
